[tox]
minversion = 4.0
envlist = style, mkdocs, py{311,312,313,314}, coverage
isolated_build = true

[testenv:style]
description = Run code style checks with flake8
labels = static
deps = 
    flake8
    flake8-import-order
    flake8-black
    flake8-builtins
    flake8-docstrings
    flake8-pyproject
commands =
    flake8 hyppo/ tests/ {posargs}

[testenv:mkdocs]
description = Generates HTML documentation using Sphinx from the source files
labels = docs
usedevelop = True
skip_install = False
changedir = docs
deps =
    -r {toxinidir}/docs/requirements.txt
commands =
    sphinx-build -W -b html -d {envtmpdir}/doctrees source {envtmpdir}/html

[testenv]
description = Run the test suite with coverage reporting
labels = dynamic
deps = 
    pytest
    pytest-cov
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
commands = pytest tests/ --cov-report= --cov=hyppo --cov-append -vm '' {posargs}


[testenv:coverage]
description = Generate coverage report
labels = dynamic
deps = 
    {[testenv]deps}
    coverage
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage
depends = py{311,312,313,314}
commands =
    coverage combine --keep
    coverage report -m --fail-under 100

[testenv:metrics]
description = Compute code quality metrics (complexity, maintainability, LOC)
labels = static
skip_install = True
deps =
    radon
    xenon
commands =
    radon raw hyppo/ -s
    radon mi hyppo/ -s
    radon cc hyppo/ -a -s
    xenon hyppo/ --max-absolute A --max-modules A --max-average A
